name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        id: build
        run: |
          ./gradlew assembleDebug 2>&1 | tee build.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            # Сохраняем краткий лог ошибки в переменную
            ERRORS=$(grep -A3 "What went wrong\|error:\|FAILED\|Exception" build.log | head -50)
            echo "BUILD_ERRORS<<EOF" >> $GITHUB_OUTPUT
            echo "$ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
          exit $EXIT

      - name: Create issue with build errors
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const errors = `${{ steps.build.outputs.BUILD_ERRORS }}`;
            const body = `## Build failed\n\n\`\`\`\n${errors}\n\`\`\``;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build failed - ${new Date().toISOString().slice(0,16)}`,
              body: body
            });

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: intercom-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
