name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          set +e
          ./gradlew assembleDebug 2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            grep -E "What went wrong|error:|FAILED|Cannot|Exception" /tmp/build.log | head -30 > build_errors.txt
            cat /tmp/build.log | tail -60 >> build_errors.txt
          fi
          exit $EXIT

      - name: Commit build errors
        if: failure()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add build_errors.txt
          git commit -m "build errors $(date +%H:%M:%S)" || true
          git push

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: intercom-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
